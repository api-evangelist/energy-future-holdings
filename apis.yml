description: >-
  Energy Future Holdings was a Dallas-based privately held energy company involved
  in electricity generation, mining, wholesale energy trading, transmission and distribution,
  and retail electricity through subsidiaries Luminant, Oncor, and TXU Energy. The
  company filed for Chapter 11 bankruptcy in 2014 and was succeeded by Vistra Corp
  (which absorbed Luminant and TXU Energy generation/retail operations) and Sempra
  Texas Utilities (which acquired Oncor). No active developer APIs are offered
  under the Energy Future Holdings name.
